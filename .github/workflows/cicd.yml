name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:    
      - name: Clone the code
        run: echo "Cloning the code"
  build:
    needs: code
    runs-on: ubuntu-latest
    steps:    
        - name: Build the code
          run: echo "Building the code"    
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:    
        - name: test the code
          run: echo "Testing the code"
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:    
        - name: Deploying
          run: echo "Deploying the app"
